# This workflow will build a package using Maven and then publish it to GitHub packages when a release is created
# For more information see: https://github.com/actions/setup-java/blob/main/docs/advanced-usage.md#apache-maven-with-a-settings-path

name:  gmail-oauth2-tools-java

on: push

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        distribution: [ 'zulu', 'temurin' ]
        java: [ '11', '17' ]
    steps:
    - uses: actions/checkout@v3
    - name: Set up JDK ${{ matrix.java }}
      uses: actions/setup-java@v3
      with:
        java-version: '${{ matrix.java }}'
        distribution: '${{ matrix.distribution }}'
        server-id: github # Value of the distributionManagement/repository/id field of the pom.xml
        settings-path: ${{ github.workspace }}/java # location for the settings.xml file

    - name: Build with Maven
      run: mvn -B package --file java/pom.xml -DjavaVersion=${{ matrix.java }}
    - name: Test with Maven
      run: mvn test --file java/pom.xml -DjavaVersion=${{ matrix.java }}
